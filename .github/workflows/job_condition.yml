name: job condition

on:
    push:
        branches: ['main']


jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: job 1 - setp 1
              run: echo "This is job one and step 1"
              
    job2:
        needs: [job1]
        runs-on: ubuntu-latest
        steps:
            - run: echo "job 2"          
            
    job3:
        needs: [job1]
        runs-on: ubuntu-latest
        steps:
            - run: echo "job 3"        

    job4:
        needs: [job1, job2]
        runs-on: ubuntu-latest
        steps:
            - run: echo "job 4"        

    job5:
        needs: [job1, job2, job3, job4]
        runs-on: ubuntu-latest
        steps:
            - run: echo "job 5"        