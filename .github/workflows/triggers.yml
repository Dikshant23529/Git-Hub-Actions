name: Trigger Examples

on:
  # Push to any branch
  push:
  
  # Pull requests to main
  pull_request:
    branches: [ dev ]
  
  # Schedule (runs every day at midnight UTC)
  schedule:
    - cron: '0 0 * * *'
  
  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  show-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Show what triggered this
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Triggered by: ${{ github.actor }}"